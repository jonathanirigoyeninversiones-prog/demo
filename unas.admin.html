<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>xxx Panel Administrativo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .editor-box { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: #f9f9f9; }
        input { padding: 8px; margin: 5px; }
        #login-box { text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="login-box">
        <h3>Acceso Administrativo</h3>
        <input type="email" id="user" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn-entrar">Entrar</button>
    </div>

    <div id="admin-panel" style="display:none;">
        <h1>Gestión de Servicios</h1>
        <button onclick="location.reload()">Cerrar sesión</button>
        
        <div style="background: #eef; padding: 15px; border-radius: 8px; margin-top: 20px;">
            <h3>Agregar Nuevo Servicio</h3>
            <input type="text" id="nuevo-nombre" placeholder="Nombre del servicio">
            <button onclick="agregarNuevoServicio()">Crear Servicio</button>
        </div>

        <div id="lista-servicios" style="margin-top: 20px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0",
            authDomain: "estilista-demo.firebaseapp.com",
            projectId: "estilista-demo",
            storageBucket: "estilista-demo.firebasestorage.app",
            messagingSenderId: "652196958867",
            appId: "1:652196958867:web:1c860102aa769ea6787366"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btn-entrar').addEventListener('click', async () => {
            const email = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                cargarServicios();
            } catch (e) { alert("Error de acceso: " + e.message); }
        });

        window.agregarNuevoServicio = async () => {
            const nombre = document.getElementById('nuevo-nombre').value;
            if (nombre) {
                await addDoc(collection(db, "servicios"), { nombre });
                alert("Servicio agregado");
                document.getElementById('nuevo-nombre').value = "";
                cargarServicios();
            } else {
                alert("Escribe un nombre");
            }
        };

        window.actualizarServicio = async (id) => {
            const nuevoNombre = document.getElementById('n-' + id).value;
            await updateDoc(doc(db, "servicios", id), { nombre: nuevoNombre });
            alert("Servicio actualizado");
        };

        window.eliminarServicio = async (id) => {
            if (confirm("¿Estás seguro de eliminar este servicio?")) {
                await deleteDoc(doc(db, "servicios", id));
                alert("Servicio eliminado");
                cargarServicios();
            }
        };

        async function cargarServicios() {
            const div = document.getElementById('lista-servicios');
            div.innerHTML = "Cargando...";
            const querySnapshot = await getDocs(collection(db, "servicios"));
            div.innerHTML = "";
            querySnapshot.forEach((docSnap) => {
                const s = docSnap.data();
                div.innerHTML += `
                    <div class="editor-box">
                        <input type="text" id="n-${docSnap.id}" value="${s.nombre}">
                        <button onclick="actualizarServicio('${docSnap.id}')">Guardar Cambios</button>
                        <button onclick="eliminarServicio('${docSnap.id}')" style="background:#ffcccc;">Eliminar</button>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
