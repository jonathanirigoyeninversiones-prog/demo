<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo Pro</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab { display: none; padding: 20px; border: 1px solid #ddd; }
        .active { display: block; }
        .editor-box { border: 1px solid #ccc; padding: 10px; margin: 5px; border-radius: 5px; }
        #login-box { text-align: center; margin-top: 50px; }
        nav button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-box">
        <h3>Acceso Administrativo</h3>
        <input type="email" id="user" placeholder="Correo">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn-entrar">Entrar</button>
    </div>

    <div id="admin-panel" style="display:none;">
        <nav>
            <button onclick="mostrarTab('tab-clientes')">Clientes</button>
            <button onclick="mostrarTab('tab-modificar')">Modificar</button>
        </nav>

        <div id="tab-clientes" class="tab active">
            <h1>Citas</h1>
            <div id="lista-citas">Cargando...</div>
        </div>

        <div id="tab-modificar" class="tab">
            <h1>Gestión de Estructura</h1>
            <h3>1. Crear Nueva Categoría</h3>
            <input type="text" id="cat-nombre" placeholder="Ej: Uñas">
            <button onclick="agregarCategoria()">Crear Categoría</button>
            
            <hr>
            
            <h3>2. Agregar Sub-servicio</h3>
            <select id="select-cat"></select>
            <input type="text" id="sub-nombre" placeholder="Ej: Acrigel">
            <button onclick="agregarSubServicio()">Guardar Sub-servicio</button>
            
            <div id="lista-estructurada" style="margin-top:20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // --- PEGA TUS CREDENCIALES AQUI ---
        const firebaseConfig = {
            apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0",
            authDomain: "estilista-demo.firebaseapp.com",
            projectId: "estilista-demo",
            storageBucket: "estilista-demo.firebasestorage.app",
            messagingSenderId: "652196958867",
            appId: "1:652196958867:web:1c860102aa769ea6787366"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const auth = getAuth();

        window.mostrarTab = (id) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.agregarCategoria = async () => {
            const nombre = document.getElementById('cat-nombre').value;
            await addDoc(collection(db, "categorias"), { nombre });
            alert("Categoría creada");
            cargarDatos();
        };

        window.agregarSubServicio = async () => {
            const categoria = document.getElementById('select-cat').value;
            const nombre = document.getElementById('sub-nombre').value;
            await addDoc(collection(db, "servicios"), { categoria, nombre });
            alert("Sub-servicio agregado");
            cargarDatos();
        };

        async function cargarDatos() {
            const catSnap = await getDocs(collection(db, "categorias"));
            const select = document.getElementById('select-cat');
            select.innerHTML = "";
            catSnap.forEach(doc => select.innerHTML += `<option value="${doc.data().nombre}">${doc.data().nombre}</option>`);

            const servSnap = await getDocs(collection(db, "servicios"));
            const lista = document.getElementById('lista-estructurada');
            lista.innerHTML = "<h4>Servicios actuales:</h4>";
            servSnap.forEach(doc => {
                const s = doc.data();
                lista.innerHTML += `<div class="editor-box"><strong>${s.categoria}:</strong> ${s.nombre} 
                <button onclick="eliminar('${doc.id}', 'servicios')">X</button></div>`;
            });
        }

        window.eliminar = async (id, col) => { await deleteDoc(doc(db, col, id)); cargarDatos(); };

        document.getElementById('btn-entrar').addEventListener('click', async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('user').value, document.getElementById('pass').value);
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                cargarDatos();
            } catch (e) { alert("Error de acceso: " + e.message); }
        });
    </script>
</body>
</html>
