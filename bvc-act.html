<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precio Dólar BCB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Botón de Tema -->
    <button id="theme-toggle" class="absolute top-4 right-4 p-2 rounded-full bg-gray-700 hover:bg-gray-600 transition">
        <span id="theme-icon">☀️</span>
    </button>

    <!-- Contenedor Principal -->
    <div class="text-center bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-700">
        <h1 class="text-2xl font-bold mb-4">Dólar BCB</h1>
        <div id="price" class="text-5xl font-mono font-bold text-blue-400 mb-6">---</div>
        <button id="refresh-btn" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-semibold transition">
            Refrescar
        </button>
    </div>

    <script>
        const priceEl = document.getElementById('price');
        const refreshBtn = document.getElementById('refresh-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        // Función para obtener el precio
        async function fetchDolar() {
            priceEl.innerText = "Cargando...";
            try {
                const response = await fetch('https://pydolarvenezuela-api.vercel.app/api/v1/dollar?monitor=bcb');
                const data = await response.json();
                priceEl.innerText = `Bs. ${data.monitors.bcb.price}`;
            } catch (error) {
                priceEl.innerText = "Error";
                console.error("Error al obtener el precio:", error);
            }
        }

        // Lógica de cambio de tema
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.body.className = isDark ? "bg-gray-900 text-white" : "bg-white text-gray-900";
            themeIcon.innerText = isDark ? "☀️" : "🌙";
        });

        refreshBtn.addEventListener('click', fetchDolar);
        
        // Carga inicial
        fetchDolar();
    </script>
</body>
</html>
