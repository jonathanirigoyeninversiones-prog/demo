    <script>
        const priceEl = document.getElementById('price');
        
        async function fetchDolar() {
            priceEl.innerText = "Consultando...";
            try {
                // Usamos una API alternativa de monitoreo del dólar BCV
                const response = await fetch('https://pydolarvenezuela-api.vercel.app/api/v1/dollar?monitor=bcv');
                
                // Si la anterior sigue fallando, probaremos esta alternativa:
                if (!response.ok) throw new Error("API caída");
                
                const data = await response.json();
                priceEl.innerText = `Bs. ${data.monitors.bcv.price}`;
            } catch (error) {
                // Alternativa de respaldo inmediata
                fetch('https://ve.dolarapi.com/v1/dolares/oficial')
                    .then(res => res.json())
                    .then(data => {
                        priceEl.innerText = `Bs. ${data.promedio}`;
                    })
                    .catch(() => {
                        priceEl.innerText = "Error de conexión";
                    });
            }
        }

        document.getElementById('theme-toggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
            document.body.classList.toggle('bg-gray-900');
            document.body.classList.toggle('bg-white');
            document.body.classList.toggle('text-white');
            document.body.classList.toggle('text-gray-900');
        };

        document.getElementById('refresh-btn').onclick = fetchDolar;
        fetchDolar();
    </script>
