<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>111 Precio Dólar BCV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Botón de Tema -->
    <button id="theme-toggle" class="absolute top-4 right-4 p-2 rounded-full bg-gray-700">
        <span id="theme-icon">☀️</span>
    </button>

    <!-- Contenedor -->
    <div class="text-center bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-700">
        <h1 class="text-2xl font-bold mb-4">Dólar BCV</h1>
        <div id="price" class="text-4xl font-bold text-blue-400 mb-6">Cargando...</div>
        <button id="refresh-btn" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-semibold transition">
            Refrescar
        </button>
    </div>

    <script>
        const priceEl = document.getElementById('price');
        
        async function fetchDolar() {
            priceEl.innerText = "Consultando...";
            try {
                // Usamos una URL directa al JSON del BCV
                const response = await fetch('https://pydolarvenezuela-api.vercel.app/api/v1/dollar?monitor=bcv');
                const data = await response.json();
                priceEl.innerText = `Bs. ${data.monitors.bcv.price}`;
            } catch (error) {
                priceEl.innerText = "Error, intenta de nuevo";
                console.error(error);
            }
        }

        document.getElementById('theme-toggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
            document.body.classList.toggle('bg-gray-900');
            document.body.classList.toggle('bg-white');
            document.body.classList.toggle('text-white');
            document.body.classList.toggle('text-gray-900');
        };

        document.getElementById('refresh-btn').onclick = fetchDolar;
        fetchDolar();
    </script>
</body>
</html>
