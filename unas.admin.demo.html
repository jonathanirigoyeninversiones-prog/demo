<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>111 Panel Administrativo Pro</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab { display: none; padding: 20px; border: 1px solid #ddd; }
        .active { display: block; }
        .cat-box { border: 2px solid #333; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .sub-box { margin-left: 20px; padding: 5px; border-bottom: 1px solid #eee; }
        .dia-box { display: inline-block; padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        .confirmado { background-color: #d4edda !important; }
        #login-box { text-align: center; margin-top: 50px; }
        nav button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-box">
        <h3>Acceso Administrativo</h3>
        <input type="email" id="user" placeholder="Correo">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn-entrar">Entrar</button>
    </div>

    <div id="admin-panel" style="display:none;">
        <nav>
            <button onclick="mostrarTab('tab-clientes')">Clientes</button>
            <button onclick="mostrarTab('tab-modificar')">Modificar</button>
        </nav>

        <div id="tab-clientes" class="tab active">
            <h1>Citas</h1>
            <button onclick="cargarDatos()">Refrescar</button>
            <table id="tabla-citas">
                <thead>
                    <tr><th>Fecha</th><th>Nombre</th><th>Apellido</th><th>Teléfono</th><th>Cat</th><th>Sub</th><th>Acciones</th></tr>
                </thead>
                <tbody id="lista-citas"></tbody>
            </table>
        </div>

        <div id="tab-modificar" class="tab">
            <h1>Gestión de Horario</h1>
            <input type="time" id="hora-cierre-input">
            <button onclick="guardarHoraCierre()">Guardar Hora Cierre</button>
            <div id="lista-dias" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0",
            authDomain: "estilista-demo.firebaseapp.com",
            projectId: "estilista-demo",
            storageBucket: "estilista-demo.firebasestorage.app",
            messagingSenderId: "652196958867",
            appId: "1:652196958867:web:1c860102aa769ea6787366"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        const auth = getAuth();

        window.mostrarTab = (id) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.cargarDatos = async () => {
            const citasSnap = await getDocs(collection(db, "citas"));
            const tbody = document.getElementById('lista-citas');
            tbody.innerHTML = "";
            citasSnap.forEach(doc => {
                const c = doc.data();
                const id = doc.id;
                const clase = c.confirmado ? 'class="confirmado"' : '';
                tbody.innerHTML += `<tr ${clase} id="row-${id}">
                    <td>${c.fecha}</td><td>${c.nombre}</td><td>${c.apellido}</td><td>${c.telefono}</td><td>${c.categoria}</td><td>${c.subcategoria}</td>
                    <td>
                        <button onclick="gestionarCita('${id}', 'confirmar')">Confirmar</button>
                        <button onclick="gestionarCita('${id}', 'listo')">Listo</button>
                        <button onclick="gestionarCita('${id}', 'cancelado')">Cancelado</button>
                    </td>
                </tr>`;
            });
        };

        setInterval(cargarDatos, 30000);

        window.gestionarCita = async (id, accion) => {
            const docRef = doc(db, "citas", id);
            const docSnap = await getDoc(docRef);
            const data = docSnap.data();

            if (accion === 'confirmar') {
                await setDoc(docRef, { ...data, confirmado: true });
                document.getElementById(`row-${id}`).classList.add('confirmado');
            } else if (accion === 'listo') {
                await addDoc(collection(db, "listo"), data);
                await deleteDoc(docRef);
                cargarDatos();
            } else if (accion === 'cancelado') {
                await addDoc(collection(db, "cancelado"), data);
                await deleteDoc(docRef);
                cargarDatos();
            }
        };

        window.guardarHoraCierre = async () => {
            const hora = document.getElementById('hora-cierre-input').value;
            await setDoc(doc(db, "config", "horario"), { cierre: hora });
            alert("Hora guardada.");
        };

        document.getElementById('btn-entrar').addEventListener('click', async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('user').value, document.getElementById('pass').value);
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                cargarDatos();
            } catch (e) { alert("Error: " + e.message); }
        });
    </script>
</body>
</html>
