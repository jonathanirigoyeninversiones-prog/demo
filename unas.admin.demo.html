<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ccccc  Panel Administrativo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #login-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        #login-box input { margin: 5px; padding: 10px; width: 250px; }
        .tab { display: none; padding: 20px; border: 1px solid #ddd; }
        .active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        table tr:nth-child(odd) { background-color: transparent; }
        table tr:nth-child(even) { background-color: #f2f2f2; }
        .confirmado { background-color: #d4edda !important; }
        .vip { background-color: #fff3cd !important; font-weight: bold; }
        .svip { background-color: #f8d7da !important; font-weight: bold; }
        .cat-box { border: 1px solid #333; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sub-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #eee; }
        .horario-box { border: 1px solid #ccc; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="login-box">
        <h3>Acceso Administrativo</h3>
        <input type="email" id="user" placeholder="Correo">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn-entrar">Entrar</button>
    </div>
    <div id="admin-panel" style="display:none;">
        <button onclick="mostrarTab('tab-clientes')">Clientes</button>
        <button onclick="mostrarTab('tab-modificar')">Modificar</button>
        <div id="tab-clientes" class="tab active">
            <button onclick="cargarDatos()">Refrescar</button>
            <button onclick="ordenarCitas()">Ordenar</button>
            <table><thead><tr><th>Fecha</th><th>Hora</th><th>Nombre</th><th>Apellido</th><th>Tel</th><th>Condición</th><th>Servicio</th><th>Acciones</th></tr></thead><tbody id="lista-citas"></tbody></table>
        </div>
        <div id="tab-modificar" class="tab">
            <h1>Gestión de Estructura</h1>
            <div class="horario-box">
                <h3>Configuración</h3>
                <div>WhatsApp: <input type="text" id="input-wpp" placeholder="Ej: 584121234567"> <button onclick="guardarConfig('whatsapp', 'input-wpp', 'numero')">Aceptar</button></div>
                <div style="margin-top:10px;">VIP (Mín servicios): <input type="number" id="input-vip"> <button onclick="guardarConfig('vip', 'input-vip', 'limite')">Aceptar</button></div>
                <div style="margin-top:10px;">SVIP (Mín servicios): <input type="number" id="input-svip"> <button onclick="guardarConfig('svip', 'input-svip', 'limite')">Aceptar</button></div>
                <h3>Horarios de Atención</h3>
                <table id="tabla-horarios"><thead><tr><th>Día</th><th>Estado</th><th>Apertura</th><th>Cierre</th><th>Máx</th><th>Acción</th></tr></thead><tbody id="lista-horarios"></tbody></table>
            </div>
            <button onclick="agregarCategoria()">+ Agregar Nueva Categoría</button>
            <div id="lista-categorias"></div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, addDoc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        const db = getFirestore(initializeApp({apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0", authDomain: "estilista-demo.firebaseapp.com", projectId: "estilista-demo", storageBucket: "estilista-demo.firebasestorage.app", messagingSenderId: "652196958867", appId: "1:652196958867:web:1c860102aa769ea6787366"}));
        
        let citasLocales = [], citasCompletadas = [], config = {};
        window.mostrarTab = (id) => { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); };
        window.guardarConfig = async (docId, inputId, campo) => { const valor = document.getElementById(inputId).value; await setDoc(doc(db, "configuracion", docId), { [campo]: valor }, { merge: true }); alert("Guardado"); cargarDatos(); };
        window.guardarHorario = async (dia) => { const apertura = document.getElementById(`apertura-${dia}`).value, cierre = document.getElementById(`cierre-${dia}`).value, limite = document.getElementById(`lim-${dia}`).value; await setDoc(doc(db, "configuracion", dia), { apertura, cierre, limite: parseInt(limite) }, { merge: true }); alert("Guardado"); };
        window.confirmarCita = async (id) => { const snap = await getDoc(doc(db, "citas", id)); await updateDoc(doc(db, "citas", id), { confirmado: !snap.data().confirmado }); cargarDatos(); };
        window.gestionarCita = async (id, destino) => { const cita = citasLocales.find(c => c.id === id); if(cita) { await addDoc(collection(db, destino), cita.data); await deleteDoc(doc(db, "citas", id)); } cargarDatos(); };
        
        const renderizarTabla = () => {
            const tbody = document.getElementById('lista-citas'); tbody.innerHTML = "";
            citasLocales.forEach(item => {
                const c = item.data, tel = c.telefono || "";
                const servicios = citasCompletadas.filter(x => x.telefono === tel).length;
                let condicion = "", clase = c.confirmado ? 'confirmado' : "";
                if (config.svip && servicios >= parseInt(config.svip)) { condicion = "SVIP"; clase += " svip"; }
                else if (config.vip && servicios >= parseInt(config.vip)) { condicion = "VIP"; clase += " vip"; }
                tbody.innerHTML += `<tr class="${clase}"><td>${c.fecha}</td><td>${c.hora}</td><td>${c.nombre}</td><td>${c.apellido}</td><td>${tel}</td><td>${condicion}</td><td>${c.subcategoria}</td><td><button onclick="confirmarCita('${item.id}')">Conf</button><button onclick="gestionarCita('${item.id}', 'listo')">Listo</button></td></tr>`;
            });
        };

        window.cargarDatos = async () => {
            citasLocales = []; citasCompletadas = [];
            const snapV = await getDoc(doc(db, "configuracion", "vip")), snapS = await getDoc(doc(db, "configuracion", "svip"));
            config = { vip: snapV.exists() ? snapV.data().limite : null, svip: snapS.exists() ? snapS.data().limite : null };
            document.getElementById('input-vip').value = config.vip || "";
            document.getElementById('input-svip').value = config.svip || "";
            (await getDocs(collection(db, "citas"))).forEach(d => citasLocales.push({ id: d.id, data: d.data() }));
            (await getDocs(collection(db, "listo"))).forEach(d => citasCompletadas.push(d.data()));
            renderizarTabla();
        };
        document.getElementById('btn-entrar').addEventListener('click', async () => { try { await signInWithEmailAndPassword(getAuth(), document.getElementById('user').value, document.getElementById('pass').value); document.getElementById('login-box').style.display = 'none'; document.getElementById('admin-panel').style.display = 'block'; cargarDatos(); } catch (e) { alert("Error"); } });
    </script>
</body>
</html>
