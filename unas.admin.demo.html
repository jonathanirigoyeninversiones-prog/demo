<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #login-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        #login-box input { margin: 5px; padding: 10px; width: 250px; }
        .tab { display: none; padding: 20px; border: 1px solid #ddd; }
        .active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .confirmado { background-color: #d4edda !important; }
        .cat-box { border: 1px solid #333; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sub-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #eee; background: #f9f9f9; }
        .horario-box { border: 1px solid #ccc; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="login-box">
        <h3>Acceso Administrativo</h3>
        <input type="email" id="user" placeholder="Correo">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn-entrar">Entrar</button>
    </div>

    <div id="admin-panel" style="display:none;">
        <button onclick="mostrarTab('tab-clientes')">Clientes</button>
        <button onclick="mostrarTab('tab-modificar')">Modificar</button>
        
        <div id="tab-clientes" class="tab active">
            <button onclick="cargarDatos()">Refrescar</button>
            <table><thead><tr><th>Fecha</th><th>Hora de solicitud</th><th>Nombre</th><th>Apellido</th><th>Tel</th><th>Dirección</th><th>Servicio</th><th>Acciones</th></tr></thead><tbody id="lista-citas"></tbody></table>
        </div>
        
        <div id="tab-modificar" class="tab">
            <h1>Gestión de Estructura</h1>
            <div class="horario-box">
                <h3>Configuración Peluquería</h3>
                <div>
                    WhatsApp: <input type="text" id="input-wpp" placeholder="Ej: 584121234567">
                    <button onclick="guardarConfig('whatsapp', 'input-wpp', 'numero')">Aceptar</button>
                </div>
                <div style="margin-top:10px;">
                    Citas Máximas (0 = Ilimitado): <input type="number" id="input-limite" placeholder="Ej: 10">
                    <button onclick="guardarConfig('limite', 'input-limite', 'cantidad')">Aceptar</button>
                </div>
                <h3>Horarios de Atención</h3>
                <div id="lista-horarios"></div>
            </div>
            <button onclick="agregarCategoria()">+ Agregar Nueva Categoría</button>
            <div id="lista-categorias"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, addDoc, updateDoc, setDoc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0", authDomain: "estilista-demo.firebaseapp.com", projectId: "estilista-demo", storageBucket: "estilista-demo.firebasestorage.app", messagingSenderId: "652196958867", appId: "1:652196958867:web:1c860102aa769ea6787366"}));
        
        window.mostrarTab = (id) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.guardarConfig = async (docId, inputId, campo) => {
            const valor = document.getElementById(inputId).value;
            await setDoc(doc(db, "configuracion", docId), { [campo]: valor }, { merge: true });
            alert("Guardado exitosamente");
        };

        window.toggleDia = async (dia) => {
            const docRef = doc(db, "configuracion", dia);
            const snap = await getDoc(docRef);
            const nuevoEstado = snap.exists() ? !snap.data().abierto : true;
            await setDoc(docRef, { abierto: nuevoEstado }, { merge: true });
            cargarDatos();
        };

        window.actualizarCierre = async (dia) => {
            const hora = prompt("Introduce hora de cierre (ej: 06:00 PM):");
            if(hora) { await setDoc(doc(db, "configuracion", dia), { cierre: hora }, { merge: true }); cargarDatos(); }
        };

        window.confirmarCita = async (id) => {
            const snap = await getDoc(doc(db, "citas", id));
            await updateDoc(doc(db, "citas", id), { confirmado: !snap.data().confirmado });
            cargarDatos();
        };
        
        window.gestionarCita = async (id, destino) => {
            const snap = await getDocs(collection(db, "citas"));
            const cita = snap.docs.find(d => d.id === id);
            if(cita) { await addDoc(collection(db, destino), cita.data()); await deleteDoc(doc(db, "citas", id)); }
            cargarDatos();
        };

        window.eliminarServicio = async (id) => { await deleteDoc(doc(db, "servicios", id)); cargarDatos(); };
        window.modificarServicio = async (id) => { const n = prompt("Nuevo nombre:"); if(n) { await updateDoc(doc(db, "servicios", id), { nombre: n }); cargarDatos(); } };
        window.agregarServicio = async (catNombre) => { const n = prompt("Nombre del nuevo servicio:"); if(n) { await addDoc(collection(db, "servicios"), { nombre: n, categoria: catNombre }); cargarDatos(); } };
        
        window.agregarCategoria = async () => { const n = prompt("Nombre de la nueva categoría:"); if(n) { await addDoc(collection(db, "categorias"), { nombre: n }); cargarDatos(); } };
        window.eliminarCategoria = async (id) => { await deleteDoc(doc(db, "categorias", id)); cargarDatos(); };
        window.modificarCategoria = async (id, nombreAntiguo) => {
            const nuevo = prompt("Nuevo nombre para la categoría:", nombreAntiguo);
            if(nuevo && nuevo !== nombreAntiguo) {
                await updateDoc(doc(db, "categorias", id), { nombre: nuevo });
                const q = query(collection(db, "servicios"), where("categoria", "==", nombreAntiguo));
                const snap = await getDocs(q);
                snap.forEach(async (s) => { await updateDoc(doc(db, "servicios", s.id), { categoria: nuevo }); });
                cargarDatos();
            }
        };

        window.cargarDatos = async () => {
            const tbody = document.getElementById('lista-citas');
            const divCat = document.getElementById('lista-categorias');
            const divHor = document.getElementById('lista-horarios');
            tbody.innerHTML = ""; divCat.innerHTML = ""; divHor.innerHTML = "";
            
            const snapWpp = await getDoc(doc(db, "configuracion", "whatsapp"));
            if(snapWpp.exists()) document.getElementById('input-wpp').value = snapWpp.data().numero || "";
            const snapLim = await getDoc(doc(db, "configuracion", "limite"));
            if(snapLim.exists()) document.getElementById('input-limite').value = snapLim.data().cantidad || 0;

            const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
            for(let d of dias) {
                const snap = await getDoc(doc(db, "configuracion", d));
                const data = snap.exists() ? snap.data() : {abierto: false, cierre: "No definido"};
                divHor.innerHTML += `<div>${d}: <button onclick="toggleDia('${d}')">${data.abierto ? 'Abierto' : 'Cerrado'}</button> 
                Cierre: <span onclick="actualizarCierre('${d}')" style="cursor:pointer; color:blue;">${data.cierre}</span></div>`;
            }

            (await getDocs(collection(db, "citas"))).forEach(d => {
                const c = d.data();
                const isConfirmado = c.confirmado || false;
                let fechaFormateada = c.fecha || '';
                if (fechaFormateada.includes('-')) {
                    const partes = fechaFormateada.split('-');
                    if (partes.length === 3) fechaFormateada = `${partes[2]}-${partes[1]}-${partes[0]}`;
                }
                
                tbody.innerHTML += `<tr class="${isConfirmado ? 'confirmado' : ''}">
                <td>${fechaFormateada}</td><td>${c.hora || ''}</td><td>${c.nombre || ''}</td><td>${c.apellido || ''}</td><td>${c.telefono || ''}</td>
                <td>${c.direccion || ''}</td><td>${c.subcategoria || ''}</td>
                <td><button onclick="confirmarCita('${d.id}')">${isConfirmado ? 'Desconfirmar' : 'Confirmar'}</button>
                <button onclick="gestionarCita('${d.id}', 'listo')">Listo</button>
                <button onclick="gestionarCita('${d.id}', 'cancelar')">Cancelar</button></td></tr>`;
            });

            const cats = await getDocs(collection(db, "categorias"));
            const servs = await getDocs(collection(db, "servicios"));
            cats.forEach(cat => {
                let catNombre = cat.data().nombre;
                let html = `<div class="cat-box"><div class="cat-header"><strong>${catNombre}</strong>
                <div><button onclick="agregarServicio('${catNombre}')">+ Agregar Servicio</button>
                <button onclick="modificarCategoria('${cat.id}', '${catNombre}')">Editar Cat</button>
                <button onclick="eliminarCategoria('${cat.id}')">Eliminar Cat</button></div></div>`;
                servs.forEach(s => { 
                    if (s.data().categoria === catNombre) {
                        html += `<div class="sub-item"><span>${s.data().nombre}</span>
                        <div><button onclick="modificarServicio('${s.id}')">Editar</button>
                        <button onclick="eliminarServicio('${s.id}')">Eliminar</button></div></div>`;
                    }
                });
                divCat.innerHTML += html + `</div>`;
            });
        };
        
        document.getElementById('btn-entrar').addEventListener('click', async () => {
            try {
                await signInWithEmailAndPassword(getAuth(), document.getElementById('user').value, document.getElementById('pass').value);
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                cargarDatos();
                setInterval(cargarDatos, 30000); 
            } catch (e) { alert("Error de acceso"); }
        });
    </script>
</body>
</html>
