<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab { display: none; padding: 20px; border: 1px solid #ddd; }
        .active { display: block; }
        .cat-box { border: 1px solid #333; padding: 15px; margin-top: 15px; border-radius: 5px; }
        .sub-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; background: #f9f9f9; }
    </style>
</head>
<body>
    <div id="admin-panel">
        <h1>Gestión de Estructura</h1>
        <div id="lista-categorias"></div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0", authDomain: "estilista-demo.firebaseapp.com", projectId: "estilista-demo", storageBucket: "estilista-demo.firebasestorage.app", messagingSenderId: "652196958867", appId: "1:652196958867:web:1c860102aa769ea6787366"}));
        
        // Funciones de acción
        window.eliminarServicio = async (id) => {
            if(confirm("¿Seguro que quieres eliminar este servicio?")) {
                await deleteDoc(doc(db, "servicios", id));
                cargarDatos();
            }
        };

        window.modificarServicio = async (id) => {
            const nuevoNombre = prompt("Introduce el nuevo nombre del servicio:");
            if(nuevoNombre) {
                await updateDoc(doc(db, "servicios", id), { nombre: nuevoNombre });
                cargarDatos();
            }
        };

        window.cargarDatos = async () => {
            const divCat = document.getElementById('lista-categorias');
            divCat.innerHTML = "Cargando...";
            
            const cats = await getDocs(collection(db, "categorias"));
            const servs = await getDocs(collection(db, "servicios"));
            
            divCat.innerHTML = "";
            cats.forEach(catDoc => {
                let catNombre = catDoc.data().nombre;
                let html = `<div class="cat-box"><strong>Categoría: ${catNombre}</strong>`;
                
                servs.forEach(s => {
                    if (s.data().categoria === catNombre) {
                        html += `<div class="sub-item"><span>${s.data().nombre}</span> 
                        <div>
                            <button onclick="modificarServicio('${s.id}')">Modificar</button>
                            <button onclick="eliminarServicio('${s.id}')">Eliminar</button>
                        </div></div>`;
                    }
                });
                divCat.innerHTML += html + `</div>`;
            });
        };

        // Carga inicial
        cargarDatos();
    </script>
</body>
</html>
