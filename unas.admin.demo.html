<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo Pro</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab { display: none; padding: 20px; border: 1px solid #ddd; }
        .active { display: block; }
        .cat-box { border: 2px solid #333; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .sub-box { margin-left: 20px; padding: 5px; border-bottom: 1px solid #eee; }
        .dia-box { display: inline-block; padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 5px; }
        #login-box { text-align: center; margin-top: 50px; }
        nav button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-box">
        <h3>Acceso Administrativo</h3>
        <input type="email" id="user" placeholder="Correo">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn-entrar">Entrar</button>
    </div>

    <div id="admin-panel" style="display:none;">
        <nav>
            <button onclick="mostrarTab('tab-clientes')">Clientes</button>
            <button onclick="mostrarTab('tab-modificar')">Modificar</button>
        </nav>

        <div id="tab-clientes" class="tab active">
            <h1>Citas</h1>
            <div id="lista-citas">Cargando...</div>
        </div>

        <div id="tab-modificar" class="tab">
            <h1>Gestión de Horario</h1>
            <input type="time" id="hora-cierre-input">
            <button onclick="guardarHoraCierre()">Guardar Hora Cierre</button>
            
            <h1>Gestión de Días Laborales</h1>
            <div id="lista-dias" style="margin-bottom: 30px;">Cargando días...</div>
            
            <h1>Gestión de Estructura</h1>
            <input type="text" id="cat-nombre" placeholder="Nombre categoría (Ej: Uñas)">
            <button onclick="agregarCategoria()">Crear Categoría</button>
            <div id="lista-categorias" style="margin-top:20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, query, where, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0",
            authDomain: "estilista-demo.firebaseapp.com",
            projectId: "estilista-demo",
            storageBucket: "estilista-demo.firebasestorage.app",
            messagingSenderId: "652196958867",
            appId: "1:652196958867:web:1c860102aa769ea6787366"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const auth = getAuth();

        window.mostrarTab = (id) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.guardarHoraCierre = async () => {
            const hora = document.getElementById('hora-cierre-input').value;
            await setDoc(doc(db, "config", "horario"), { cierre: hora });
            alert("Hora de cierre guardada: " + hora);
        };

        window.toggleDia = async (dia, estadoActual) => {
            await setDoc(doc(db, "dias_activos", dia), { activo: !estadoActual });
            cargarDatos();
        };

        async function cargarDatos() {
            // Cargar Citas
            const citasSnap = await getDocs(collection(db, "citas"));
            const divCitas = document.getElementById('lista-citas');
            divCitas.innerHTML = "";
            citasSnap.forEach(doc => {
                const c = doc.data();
                divCitas.innerHTML += `<p>${c.fecha} - ${c.nombre} ${c.apellido} (${c.telefono})</p>`;
            });

            // Cargar días
            const diasSemana = ["lunes", "martes", "miercoles", "jueves", "viernes", "sabado", "domingo"];
            const divDias = document.getElementById('lista-dias');
            divDias.innerHTML = "";
            for (const dia of diasSemana) {
                const snap = await getDoc(doc(db, "dias_activos", dia));
                const activo = snap.exists() ? snap.data().activo : false;
                divDias.innerHTML += `<div class="dia-box" style="background:${activo ? '#d4af37' : '#eee'}">
                    ${dia.toUpperCase()}<br>
                    <button onclick="toggleDia('${dia}', ${activo})">${activo ? 'Cerrar' : 'Abrir'}</button>
                </div>`;
            }

            // Cargar categorías
            const catSnap = await getDocs(collection(db, "categorias"));
            const servSnap = await getDocs(collection(db, "servicios"));
            const div = document.getElementById('lista-categorias');
            div.innerHTML = "";
            catSnap.forEach(catDoc => {
                const cat = catDoc.data().nombre;
                div.innerHTML += `<div class="cat-box">
                    <strong>Categoría: ${cat}</strong>
                    <button onclick="agregarSub('${cat}')">Agregar Sub-servicio</button>
                    <button onclick="modificarCategoria('${catDoc.id}', '${cat}')">Modificar</button>
                    <button onclick="eliminarCategoria('${catDoc.id}', '${cat}')" style="background:red; color:white;">Borrar Categoría</button>
                    <div id="sub-${catDoc.id}"></div>
                </div>`;
                servSnap.forEach(sDoc => {
                    if(sDoc.data().categoria === cat) {
                        document.getElementById(`sub-${catDoc.id}`).innerHTML += 
                        `<div class="sub-box">- ${sDoc.data().nombre} <button onclick="eliminar('${sDoc.id}')">Eliminar</button></div>`;
                    }
                });
            });
        }

        window.agregarCategoria = async () => {
            const nombre = document.getElementById('cat-nombre').value;
            if(nombre) { await addDoc(collection(db, "categorias"), { nombre }); cargarDatos(); }
        };

        window.modificarCategoria = async (id, nombreActual) => {
            const nuevoNombre = prompt("Nuevo nombre para la categoría:", nombreActual);
            if(nuevoNombre) { await updateDoc(doc(db, "categorias", id), { nombre: nuevoNombre }); cargarDatos(); }
        };

        window.agregarSub = async (catNombre) => {
            const subNombre = prompt("Nombre del sub-servicio para " + catNombre + ":");
            if(subNombre) { await addDoc(collection(db, "servicios"), { categoria: catNombre, nombre: subNombre }); cargarDatos(); }
        };

        window.eliminarCategoria = async (id, catNombre) => {
            if(confirm("¿Borrar esta categoría y todos sus sub-servicios?")) {
                const q = query(collection(db, "servicios"), where("categoria", "==", catNombre));
                const querySnapshot = await getDocs(q);
                querySnapshot.forEach(async (sDoc) => await deleteDoc(sDoc.ref));
                await deleteDoc(doc(db, "categorias", id));
                cargarDatos();
            }
        };

        window.eliminar = async (id) => { await deleteDoc(doc(db, "servicios", id)); cargarDatos(); };

        document.getElementById('btn-entrar').addEventListener('click', async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('user').value, document.getElementById('pass').value);
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                cargarDatos();
            } catch (e) { alert("Error: " + e.message); }
        });
    </script>
</body>
</html>
