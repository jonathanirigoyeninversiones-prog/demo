<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #login-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        #login-box input { margin: 5px; padding: 10px; width: 250px; }
        .tab { display: none; padding: 20px; border: 1px solid #ddd; }
        .active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .cat-box { border: 1px solid #333; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .sub-box { margin-left: 20px; padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="login-box">
        <h3>Acceso Administrativo</h3>
        <input type="email" id="user" placeholder="Correo">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn-entrar">Entrar</button>
    </div>
    <div id="admin-panel" style="display:none;">
        <button onclick="mostrarTab('tab-clientes')">Clientes</button>
        <button onclick="mostrarTab('tab-modificar')">Modificar</button>
        <div id="tab-clientes" class="tab active">
            <button onclick="cargarDatos()">Refrescar Tabla</button>
            <table><thead><tr><th>Fecha</th><th>Nombre</th><th>Tel</th><th>Dir</th><th>Servicio</th><th>Acciones</th></tr></thead><tbody id="lista-citas"></tbody></table>
        </div>
        <div id="tab-modificar" class="tab">
            <h1>Configuración de WhatsApp</h1>
            <input type="tel" id="admin-ws-input" placeholder="Tu número WhatsApp">
            <button onclick="guardarAdminWS()">Guardar Número</button>
            <h1>Gestión de Estructura</h1>
            <div id="lista-categorias"></div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, getDoc, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0", authDomain: "estilista-demo.firebaseapp.com", projectId: "estilista-demo", storageBucket: "estilista-demo.firebasestorage.app", messagingSenderId: "652196958867", appId: "1:652196958867:web:1c860102aa769ea6787366"}));
        
        window.mostrarTab = (id) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.guardarAdminWS = async () => {
            const num = document.getElementById('admin-ws-input').value;
            await setDoc(doc(db, "config", "whatsapp_admin"), { numero: num });
            alert("Número guardado.");
        };

        window.editarElemento = async (col, id, actual) => {
            const nuevo = prompt("Nuevo nombre:", actual);
            if (nuevo) { await updateDoc(doc(db, col, id), { nombre: nuevo }); cargarDatos(); }
        };

        window.cargarDatos = async () => {
            const tbody = document.getElementById('lista-citas');
            const divCat = document.getElementById('lista-categorias');
            tbody.innerHTML = "";
            divCat.innerHTML = "";
            
            const wsSnap = await getDoc(doc(db, "config", "whatsapp_admin"));
            if(wsSnap.exists()) document.getElementById('admin-ws-input').value = wsSnap.data().numero;
            const adminNum = wsSnap.exists() ? wsSnap.data().numero : "";
            
            (await getDocs(collection(db, "citas"))).forEach(d => {
                const c = d.data();
                tbody.innerHTML += `<tr><td>${c.fecha}</td><td>${c.nombre} ${c.apellido}</td><td>${c.telefono}</td><td>${c.direccion || 'N/A'}</td><td>${c.subcategoria}</td>
                <td><button onclick="window.open('https://wa.me/${adminNum}?text=Hola, confirmamos su cita')">WhatsApp</button> <button onclick="gestionar('${d.id}', 'listo')">Listo</button></td></tr>`;
            });

            const cats = await getDocs(collection(db, "categorias"));
            const servs = await getDocs(collection(db, "servicios"));
            cats.forEach((catDoc) => {
                const catData = catDoc.data();
                let html = `<div class="cat-box"><strong>${catData.nombre}</strong> 
                            <button onclick="editarElemento('categorias', '${catDoc.id}', '${catData.nombre}')">Editar</button>`;
                servs.forEach(sDoc => {
                    if(sDoc.data().categoria === catData.nombre) 
                        html += `<div class="sub-box">- ${sDoc.data().nombre} <button onclick="editarElemento('servicios', '${sDoc.id}', '${sDoc.data().nombre}')">Editar</button></div>`;
                });
                divCat.innerHTML += html + `</div>`;
            });
        };
        
        setInterval(cargarDatos, 30000);
        
        window.gestionar = async (id, col) => {
            const snap = await getDocs(collection(db, "citas"));
            const data = snap.docs.find(d => d.id === id).data();
            await addDoc(collection(db, col), data);
            await deleteDoc(doc(db, "citas", id));
            cargarDatos();
        };

        document.getElementById('btn-entrar').addEventListener('click', async () => {
            try {
                await signInWithEmailAndPassword(getAuth(), document.getElementById('user').value, document.getElementById('pass').value);
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                cargarDatos();
            } catch (e) { alert("Error: " + e.message); }
        });
    </script>
</body>
</html>
