<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>1111 Panel Administrativo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab { display: none; padding: 20px; border: 1px solid #ddd; }
        .active { display: block; }
        .cat-box { border: 1px solid #333; padding: 15px; margin-top: 15px; border-radius: 5px; }
        .sub-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; background: #f9f9f9; }
    </style>
</head>
<body>
    <div id="admin-panel">
        <button onclick="cargarDatos()">CARGAR Y DEPURAR DATOS</button>
        <div id="lista-categorias"></div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0", authDomain: "estilista-demo.firebaseapp.com", projectId: "estilista-demo", storageBucket: "estilista-demo.firebasestorage.app", messagingSenderId: "652196958867", appId: "1:652196958867:web:1c860102aa769ea6787366"}));
        
        window.cargarDatos = async () => {
            const divCat = document.getElementById('lista-categorias');
            divCat.innerHTML = "Cargando...";
            
            const cats = await getDocs(collection(db, "categorias"));
            const servs = await getDocs(collection(db, "servicios"));
            
            console.log("Total categorías:", cats.size);
            console.log("Total servicios:", servs.size);
            
            divCat.innerHTML = "";
            cats.forEach(catDoc => {
                let catNombre = catDoc.data().nombre;
                console.log("Procesando categoría:", catNombre);
                
                let html = `<div class="cat-box"><strong>Categoría: ${catNombre}</strong>`;
                
                servs.forEach(s => {
                    let sData = s.data();
                    console.log("Comparando servicio:", sData.nombre, "con categoria:", sData.categoria);
                    
                    if (sData.categoria === catNombre) {
                        html += `<div class="sub-item"><span>${sData.nombre}</span> 
                        <button>Modificar</button><button>Eliminar</button></div>`;
                    }
                });
                divCat.innerHTML += html + `</div>`;
            });
        };
    </script>
</body>
</html>
