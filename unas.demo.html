<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>cccc Reserva de Citas - Salon Beauty</title>
    <style>
        body { background-image: url('fondo-unas.png'); background-size: cover; background-position: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .container { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px; max-width: 600px; margin: 40px auto; }
        .btn-cat, .btn-sub { padding: 10px; margin: 5px; cursor: pointer; border: 1px solid #d4af37; background: #fff; border-radius: 5px; }
        .btn-cat:hover, .btn-sub:hover { background: #d4af37; color: #fff; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        #modal-confirmacion { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-contenido { background: white; padding: 30px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Reserva tu cita</h3>
        <input type="date" id="fecha-cita" onchange="validarDia()">
        <div id="msg-dia"></div>
        <div id="categorias-container" style="display:none; margin-top: 20px;"></div>
        <div id="subcategorias-container" style="display:none; margin-top: 20px;"></div>
        
        <div id="formulario-reserva" style="display:none; margin-top: 20px;">
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="apellido" placeholder="Apellido">
            <input type="tel" id="telefono" placeholder="Teléfono">
            <button onclick="confirmarCita()">Confirmar Reserva</button>
        </div>
    </div>

    <div id="modal-confirmacion">
        <div class="modal-contenido">
            <h3>Gracias por confiar en nosotros</h3>
            <p>Pronto nos pondremos en contacto para confirmar la cita.</p>
            <button onclick="location.reload()">Aceptar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0",
            authDomain: "estilista-demo.firebaseapp.com",
            projectId: "estilista-demo",
            storageBucket: "estilista-demo.firebasestorage.app",
            messagingSenderId: "652196958867",
            appId: "1:652196958867:web:1c860102aa769ea6787366"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        window.selCat = ""; window.selSub = "";

        document.getElementById('fecha-cita').min = new Date().toISOString().split('T')[0];

        window.validarDia = async () => {
            const fecha = document.getElementById('fecha-cita').value;
            const diaNombre = ["domingo", "lunes", "martes", "miercoles", "jueves", "viernes", "sabado"][new Date(fecha + 'T00:00:00').getDay()];
            const snap = await getDoc(doc(db, "dias_activos", diaNombre));
            if (snap.exists() && snap.data().activo) {
                document.getElementById('msg-dia').innerHTML = "Día disponible.";
                cargarCategorias();
            } else {
                document.getElementById('msg-dia').innerHTML = "Día no disponible.";
            }
        };

        async function cargarCategorias() {
            const container = document.getElementById('categorias-container');
            container.style.display = "block";
            container.innerHTML = "Seleccione categoría: ";
            const snaps = await getDocs(collection(db, "categorias"));
            snaps.forEach(doc => {
                const nombre = doc.data().nombre;
                container.innerHTML += `<button class="btn-cat" onclick="cargarSubs('${nombre}')">${nombre}</button>`;
            });
        }

        window.cargarSubs = async (cat) => {
            window.selCat = cat;
            const container = document.getElementById('subcategorias-container');
            container.style.display = "block";
            container.innerHTML = "Seleccione servicio: ";
            const snaps = await getDocs(collection(db, "servicios"));
            snaps.forEach(doc => {
                const data = doc.data();
                if(data.categoria === cat) {
                    container.innerHTML += `<button class="btn-sub" onclick="prepararForm('${data.nombre}')">${data.nombre}</button>`;
                }
            });
        };

        window.prepararForm = (sub) => {
            window.selSub = sub;
            document.getElementById('formulario-reserva').style.display = "block";
        };

        window.confirmarCita = async () => {
            await addDoc(collection(db, "citas"), {
                fecha: document.getElementById('fecha-cita').value,
                nombre: document.getElementById('nombre').value,
                apellido: document.getElementById('apellido').value,
                telefono: document.getElementById('telefono').value,
                categoria: window.selCat,
                subcategoria: window.selSub
            });
            document.getElementById('modal-confirmacion').style.display = "flex";
        };
    </script>
</body>
</html>
