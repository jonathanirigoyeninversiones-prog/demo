<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva de Citas - Salon Beauty</title>
    <style>
        body { background-image: url('fondo-unas.png'); background-size: cover; background-position: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .container { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px; max-width: 600px; margin: 40px auto; }
        .btn-cat, .btn-sub { padding: 10px; margin: 5px; cursor: pointer; border: 1px solid #d4af37; background: #fff; border-radius: 5px; }
        .btn-cat:hover, .btn-sub:hover { background: #d4af37; color: #fff; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        #modal-confirmacion { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-contenido { background: white; padding: 30px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Reserva tu cita</h3>
        <input type="date" id="fecha-cita" onchange="validarDia()">
        <div id="msg-dia"></div>
        <div id="categorias-container" style="display:none; margin-top: 20px;"></div>
        <div id="subcategorias-container" style="display:none; margin-top: 20px;"></div>
        <div id="formulario-reserva" style="display:none; margin-top: 20px;">
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="apellido" placeholder="Apellido">
            <input type="tel" id="telefono" placeholder="Teléfono">
            <input type="text" id="direccion" placeholder="Dirección">
            <button onclick="solicitarCita()">Solicitar Cita</button>
        </div>
    </div>
    <div id="modal-confirmacion">
        <div class="modal-contenido">
            <h3>Gracias por preferirnos</h3>
            <p>En poco te contactaremos para confirmar la cita</p>
            <button onclick="location.reload()">Aceptar</button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app-check.js";
        
        const app = initializeApp({apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0", authDomain: "estilista-demo.firebaseapp.com", projectId: "estilista-demo", storageBucket: "estilista-demo.firebasestorage.app", messagingSenderId: "652196958867", appId: "1:652196958867:web:1c860102aa769ea6787366"});
        const db = getFirestore(app);

        initializeAppCheck(app, {
            provider: new ReCaptchaV3Provider('6LdCelktAAAAAPFK_qUlAldO_foy9DlgZh0nliiV'),
            isTokenAutoRefreshEnabled: true
        });

        document.getElementById('fecha-cita').setAttribute('min', new Date().toISOString().split('T')[0]);
        
        window.validarDia = async () => {
            const fechaVal = document.getElementById('fecha-cita').value;
            const msg = document.getElementById('msg-dia');
            const fechaSel = new Date(fechaVal + 'T00:00:00');
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            
            if (fechaSel < hoy) { msg.innerHTML = "No se puede reservar en días pasados."; return; }
            
            const diasSemana = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            const diaNombre = diasSemana[fechaSel.getDay()];
            const snap = await getDoc(doc(db, "configuracion", diaNombre));
            
            const formatAMPM = (timeStr) => {
                let [hours, minutes] = timeStr.split(':');
                let ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                hours = hours ? hours : 12; 
                return `${hours}:${minutes} ${ampm}`;
            };

            if (!snap.exists() || !snap.data().abierto) {
                msg.innerHTML = "Lo lamentamos, este día no se laborará.";
                document.getElementById('categorias-container').style.display = "none";
                return;
            }

            const data = snap.data();
            const apertura = formatAMPM(data.apertura || "08:00");
            const cierre = formatAMPM(data.cierre || "18:00");
            
            msg.innerHTML = `Día disponible. Horarios de atención: ${apertura} a ${cierre}.`;

            const maxCitas = data.limite ? parseInt(data.limite) : 0;
            if (maxCitas > 0) {
                const qCitas = query(collection(db, "citas"), where("fecha", "==", fechaVal));
                const totalCitas = (await getDocs(qCitas)).size;
                if (totalCitas >= maxCitas) { 
                    msg.innerHTML = "Lo lamentamos, ya no hay cupos disponibles para este día."; 
                    document.getElementById('categorias-container').style.display = "none";
                    return; 
                }
            }

            const container = document.getElementById('categorias-container');
            container.style.display = "block";
            container.innerHTML = "<strong>Seleccione categoría:</strong><br>";
            (await getDocs(collection(db, "categorias"))).forEach(d => container.innerHTML += `<button class="btn-cat" onclick="cargarSubs('${d.data().nombre}')">${d.data().nombre}</button>`);
        };

        window.cargarSubs = async (cat) => {
            window.selCat = cat;
            const container = document.getElementById('subcategorias-container');
            container.style.display = "block";
            container.innerHTML = "<strong>Seleccione servicio:</strong><br>";
            (await getDocs(collection(db, "servicios"))).forEach(d => { if(d.data().categoria === cat) container.innerHTML += `<button class="btn-sub" onclick="prepararForm('${d.data().nombre}')">${d.data().nombre}</button>`; });
        };
        window.prepararForm = (sub) => { window.selSub = sub; document.getElementById('formulario-reserva').style.display = "block"; };
        window.solicitarCita = async () => {
            const horaActual = new Date().toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit' });
            const datos = { fecha: document.getElementById('fecha-cita').value, nombre: document.getElementById('nombre').value, apellido: document.getElementById('apellido').value, telefono: document.getElementById('telefono').value, direccion: document.getElementById('direccion').value, categoria: window.selCat, subcategoria: window.selSub, hora: horaActual };
            await addDoc(collection(db, "citas"), datos);
            const snapWpp = await getDoc(doc(db, "configuracion", "whatsapp"));
            const numWpp = snapWpp.exists() ? snapWpp.data().numero : "";
            const mensaje = `Solicitud de cita: ${datos.nombre} ${datos.apellido}, Fecha: ${datos.fecha}, Servicio: ${datos.subcategoria}, Dirección: ${datos.direccion}`;
            window.open(`https://wa.me/${numWpp}?text=${encodeURIComponent(mensaje)}`, '_blank');
            document.getElementById('modal-confirmacion').style.display = "flex";
        };
    </script>

    <!-- Código de verificación del interruptor -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const adminApp = initializeApp({
            projectId: "master-web-admin"
        }, "adminApp");
        
        const dbAdmin = getFirestore(adminApp);

        async function verificarAcceso() {
            try {
                const docRef = doc(dbAdmin, "Master_web", "demo_estilista");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists() && docSnap.data().activo === false) {
                    document.body.innerHTML = "<h2 style='text-align:center; margin-top:20%;'>Sitio en mantenimiento. Vuelva pronto.</h2>";
                }
            } catch (error) {
                console.error("Error al verificar acceso:", error);
            }
        }
        verificarAcceso();
    </script>
</body>
</html>
