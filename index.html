<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva tu cita</title>
    <style>
        .menu { display: flex; gap: 15px; background: #f4f4f4; padding: 10px; }
        .categoria { cursor: pointer; color: blue; text-decoration: underline; }
        #calendario-container, #formulario-reserva { display: none; margin-top: 20px; padding: 15px; }
        .hora-btn { display: block; margin: 5px; padding: 10px; cursor: pointer; background: #e0e0e0; border: none; }
        .hora-btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        input { display: block; margin-bottom: 10px; padding: 8px; width: 250px; }
    </style>
</head>
<body>

    <div class="menu">
        <div class="categoria" onclick="seleccionarCategoria('Uñas')">Uñas</div>
        <div class="categoria" onclick="seleccionarCategoria('Cabello')">Cabello</div>
        <div class="categoria" onclick="seleccionarCategoria('Cejas')">Cejas</div>
        <div class="categoria" onclick="seleccionarCategoria('Pestañas')">Pestañas</div>
        <div class="categoria" onclick="seleccionarCategoria('Pies')">Pies</div>
    </div>

    <div id="calendario-container">
        <h3>Selecciona una fecha:</h3>
        <input type="date" id="fecha-cita" onchange="cargarHorarios()">
        <div id="horarios-container"></div>
    </div>

    <div id="formulario-reserva">
        <h3>Datos para la cita</h3>
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="apellido" placeholder="Apellido" required>
        <input type="tel" id="telefono" placeholder="Teléfono" required>
        <input type="text" id="direccion" placeholder="Dirección" required>
        <button onclick="confirmarCita()">Confirmar cita</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0",
            authDomain: "estilista-demo.firebaseapp.com",
            projectId: "estilista-demo",
            storageBucket: "estilista-demo.firebasestorage.app",
            messagingSenderId: "652196958867",
            appId: "1:652196958867:web:1c860102aa769ea6787366"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        window.categoriaActual = "";
        window.horaSeleccionada = "";
        
        window.seleccionarCategoria = (cat) => {
            window.categoriaActual = cat;
            document.getElementById('calendario-container').style.display = 'block';
            document.getElementById('formulario-reserva').style.display = 'none';
        };

        window.cargarHorarios = async () => {
            const inputFecha = document.getElementById('fecha-cita').value;
            if (!inputFecha) return;

            const fecha = new Date(inputFecha + 'T00:00:00');
            const dias = ["domingo", "lunes", "martes", "miercoles", "jueves", "viernes", "sabado"];
            const nombreDia = dias[fecha.getDay()];
            const container = document.getElementById('horarios-container');
            container.innerHTML = `Cargando...`;

            try {
                // 1. Verificar si el día está activo
                const diaActivoSnap = await getDoc(doc(db, "dias_activos", nombreDia));
                if (!diaActivoSnap.exists() || !diaActivoSnap.data().activo) {
                    container.innerHTML = `<p>Lo sentimos, hoy no laboramos.</p>`;
                    return;
                }

                // 2. Obtener horarios configurados y citas existentes
                const horDoc = await getDoc(doc(db, "horarios", nombreDia));
                const citasSnap = await getDocs(query(collection(db, "citas"), where("fecha", "==", inputFecha)));
                const horasOcupadas = citasSnap.docs.map(doc => doc.data().hora);

                if (horDoc.exists()) {
                    container.innerHTML = `<h4>Horarios para el ${nombreDia}:</h4>`;
                    horDoc.data().lista.forEach(hora => {
                        const estaOcupada = horasOcupadas.includes(hora);
                        const disabled = estaOcupada ? "disabled" : "";
                        container.innerHTML += `<button class="hora-btn" ${disabled} onclick="abrirFormulario('${hora}')">${hora} ${estaOcupada ? '(Reservado)' : ''}</button>`;
                    });
                }
            } catch (e) {
                container.innerHTML = `<p>Error: ${e.message}</p>`;
            }
        };

        window.abrirFormulario = (hora) => {
            window.horaSeleccionada = hora;
            document.getElementById('formulario-reserva').style.display = 'block';
        };

        window.confirmarCita = async () => {
            const datos = {
                nombre: document.getElementById('nombre').value,
                apellido: document.getElementById('apellido').value,
                telefono: document.getElementById('telefono').value,
                direccion: document.getElementById('direccion').value,
                categoria: window.categoriaActual,
                fecha: document.getElementById('fecha-cita').value,
                hora: window.horaSeleccionada
            };

            try {
                await addDoc(collection(db, "citas"), datos);
                alert("¡Cita confirmada!");
                location.reload();
            } catch (e) {
                alert("Error al guardar: " + e.message);
            }
        };
    </script>
</body>
</html>
