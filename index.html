<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva tu cita</title>
    <style>
        .menu { display: flex; gap: 15px; background: #f4f4f4; padding: 10px; }
        .categoria { cursor: pointer; color: blue; text-decoration: underline; }
        #calendario-container { display: none; margin-top: 20px; }
        .hora-btn { display: block; margin: 5px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="menu">
        <div class="categoria" onclick="seleccionarCategoria('Uñas')">Uñas</div>
        <div class="categoria" onclick="seleccionarCategoria('Cabello')">Cabello</div>
        <div class="categoria" onclick="seleccionarCategoria('Cejas')">Cejas</div>
        <div class="categoria" onclick="seleccionarCategoria('Pestañas')">Pestañas</div>
        <div class="categoria" onclick="seleccionarCategoria('Pies')">Pies</div>
    </div>

    <div id="calendario-container">
        <h3>Selecciona una fecha:</h3>
        <input type="date" id="fecha-cita" onchange="cargarHorarios()">
        <div id="horarios-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0",
            authDomain: "estilista-demo.firebaseapp.com",
            projectId: "estilista-demo",
            storageBucket: "estilista-demo.firebasestorage.app",
            messagingSenderId: "652196958867",
            appId: "1:652196958867:web:1c860102aa769ea6787366"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        
        window.seleccionarCategoria = (cat) => {
            window.categoriaActual = cat;
            document.getElementById('calendario-container').style.display = 'block';
        };

        window.cargarHorarios = async () => {
            const inputFecha = document.getElementById('fecha-cita').value;
            if (!inputFecha) return;

            const fecha = new Date(inputFecha + 'T00:00:00');
            const dias = ["domingo", "lunes", "martes", "miercoles", "jueves", "viernes", "sabado"];
            const nombreDia = dias[fecha.getDay()];

            const container = document.getElementById('horarios-container');
            container.innerHTML = `Cargando horarios para el ${nombreDia}...`;

            try {
                const docRef = doc(db, "horarios", nombreDia);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const horas = docSnap.data().lista;
                    container.innerHTML = `<h4>Horarios disponibles para ${nombreDia}:</h4>`;
                    horas.forEach(hora => {
                        container.innerHTML += `<button class="hora-btn">${hora}</button>`;
                    });
                } else {
                    container.innerHTML = `<p>No hay configuración de horarios para el ${nombreDia}.</p>`;
                }
            } catch (e) {
                container.innerHTML = `<p>Error al cargar: ${e.message}</p>`;
            }
        };
    </script>
</body>
</html>
