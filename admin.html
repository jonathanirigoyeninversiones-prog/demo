<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>11 Panel de Administración</title>
</head>
<body>
    <h1>Historial de Citas</h1>
    <ul id="lista-citas"></ul>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0",
            authDomain: "estilista-demo.firebaseapp.com",
            projectId: "estilista-demo",
            storageBucket: "estilista-demo.firebasestorage.app",
            messagingSenderId: "652196958867",
            appId: "1:652196958867:web:1c860102aa769ea6787366"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const lista = document.getElementById('lista-citas');

        async function cargarCitas() {
            const querySnapshot = await getDocs(collection(db, "citas"));
            lista.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const c = doc.data();
                // Aquí estamos llamando a todos los campos que guardamos
                lista.innerHTML += `<li>
                    <strong>${c.nombre} ${c.apellido}</strong> - 
                    ${c.fecha} a las ${c.hora} <br>
                    Tel: ${c.telefono} | Dir: ${c.direccion} | Servicio: ${c.categoria}
                </li><br>`;
            });
        }

        cargarCitas();
    </script>
</body>
</html>
