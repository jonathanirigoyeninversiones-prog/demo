<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>11 Admin Login</title>
</head>
<body>
    <div id="login-form">
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Clave">
        <button onclick="login()">Entrar</button>
    </div>
    <div id="panel" style="display:none;">
        <h1>Historial de Citas</h1>
        <ul id="citas-container"></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = { /* PEGA AQUÍ TU CONFIGuración ANTERIOR */ };
        const db = getFirestore(initializeApp(firebaseConfig));

        window.login = async () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const cred = await getDoc(doc(db, "credenciales", "admin"));
            
            if(cred.exists() && cred.data().usuario === u && cred.data().clave === p) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                cargarCitas();
            } else { alert("Usuario o clave incorrecta"); }
        };

        async function cargarCitas() {
            const snap = await getDocs(collection(db, "citas"));
            const container = document.getElementById('citas-container');
            snap.forEach(d => {
                const data = d.data();
                container.innerHTML += `<li>${data.nombre} ${data.apellido} - Tel: ${data.telefono} - <strong>Dir: ${data.direccion}</strong></li>`;
            });
        }
    </script>
</body>
</html>
