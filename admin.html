<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>222 Admin Login</title>
</head>
<body>
    <div id="login-form">
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Clave">
        <button onclick="login()">Entrar</button>
    </div>
    <div id="panel" style="display:none;">
        <h1>Historial de Citas</h1>
        <ul id="citas-container"></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0",
            authDomain: "estilista-demo.firebaseapp.com",
            projectId: "estilista-demo",
            storageBucket: "estilista-demo.firebasestorage.app",
            messagingSenderId: "652196958867",
            appId: "1:652196958867:web:1c860102aa769ea6787366",
            measurementId: "G-DTB0D8XRWK"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        window.login = async () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            try {
                const docSnap = await getDoc(doc(db, "credenciales", "admin"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.usuario === u && data.clave === p) {
                        document.getElementById('login-form').style.display = 'none';
                        document.getElementById('panel').style.display = 'block';
                        
                        // Cargar citas
                        const snap = await getDocs(collection(db, "citas"));
                        const container = document.getElementById('citas-container');
                        snap.forEach(d => {
                            const c = d.data();
                            container.innerHTML += `<li>${c.nombre} ${c.apellido} - Dir: ${c.direccion}</li>`;
                        });
                    } else {
                        alert("Usuario o clave incorrectos");
                    }
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        };
    </script>
</body>
</html>
