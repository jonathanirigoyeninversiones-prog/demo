<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Seguro</title>
</head>
<body>
    <div id="login-form">
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
    </div>
    <div id="panel" style="display:none;">
        <h1>Historial de Citas</h1>
        <ul id="citas-container"></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCN2ah_fSjW385KgAb48W8Cd9PhFDOQJ0",
            authDomain: "estilista-demo.firebaseapp.com",
            projectId: "estilista-demo",
            storageBucket: "estilista-demo.firebasestorage.app",
            messagingSenderId: "652196958867",
            appId: "1:652196958867:web:1c860102aa769ea6787366"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.login = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                cargarCitas();
            } catch (e) {
                alert("Error: " + e.message);
            }
        };

        async function cargarCitas() {
            const snap = await getDocs(collection(db, "citas"));
            const container = document.getElementById('citas-container');
            snap.forEach(d => {
                const c = d.data();
                container.innerHTML += `<li>${c.nombre} - ${c.direccion}</li>`;
            });
        }
    </script>
</body>
</html>
